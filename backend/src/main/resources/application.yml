server:
  port: 8080

spring:
  application:
    name: distributed-search-suggestion

# --- Application tuning knobs (all documented in docs/ARCHITECTURE.md) ---
app:
  suggest:
    top-k: 10                 # number of suggestions returned per prefix
  cache:
    # A single Redis server holds N *logical* cache nodes (one Redis logical DB
    # each). Our ConsistentHashRing (client-side consistent hashing) decides
    # which logical node owns a prefix; one server serves every request.
    server: localhost:6379    # the single Redis server
    logical-nodes: 3          # logical nodes = Redis DBs 0..N-1 on that server
    embedded: true            # true = backend boots a real redis-server binary
                              #        (no Docker). false = external Redis.
    virtual-nodes: 150        # virtual nodes per logical node (smooths spread)
    ttl-ms: 30000             # cache entry time-to-live (Redis EX)
    profile-key-length: 2     # how many leading chars decide the owning node
  batch:
    size: 500                 # flush when buffer reaches this many submissions
    flush-interval-ms: 2000   # ...or at least this often
  trending:
    half-life-sec: 300        # recency decay half-life for trending score
    window-size: 50           # how many trending queries to track in detail
  dataset:
    # Full hourly dump downloaded by scripts/fetch-dataset.sh; falls back to
    # the bundled sample on the classpath if this file is absent.
    file: ./data/pageviews
    sample-classpath: data/pageviews-sample.txt
    min-views: 1
    project-filter: en        # keep only English Wikipedia rows

logging:
  level:
    com.dsss: INFO
