server:
  port: 8080

spring:
  application:
    name: distributed-search-suggestion

# --- Application tuning knobs (all documented in docs/ARCHITECTURE.md) ---
app:
  suggest:
    top-k: 10                 # number of suggestions returned per prefix
  cache:
    # A single Redis server holds N *logical* cache nodes (one Redis logical DB
    # each). Our ConsistentHashRing (client-side consistent hashing) decides
    # which logical node owns a prefix; one server serves every request.
    server: localhost:6379    # the single Redis server
    logical-nodes: 3          # logical nodes = Redis DBs 0..N-1 on that server
    embedded: true            # true = backend boots a real redis-server binary
                              #        (no Docker). false = external Redis.
    virtual-nodes: 150        # virtual nodes per logical node (smooths spread)
    ttl-ms: 30000             # cache entry time-to-live (Redis EX)
    profile-key-length: 2     # how many leading chars decide the owning node
  batch:
    size: 500                 # flush when buffer reaches this many submissions
    flush-interval-ms: 2000   # ...or at least this often
  db:
    # Durable primary store. Embedded Postgres boots a real postgres binary
    # in-process (no Docker) and persists to data-dir across restarts.
    embedded: true
    port: 5433
    data-dir: ./data/pgdata
    seed-batch-size: 5000     # rows per batch when first-run seeding from ORCAS
    # Used only when embedded=false (external Postgres):
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  trending:
    half-life-sec: 300        # recency decay half-life for trending score
    window-size: 50           # how many trending queries to track in detail
  dataset:
    # ORCAS (Microsoft): real Bing search queries with click counts.
    # Full dump downloaded by scripts/fetch-dataset.sh; falls back to the
    # bundled sample on the classpath if the file is absent.
    format: orcas             # orcas | pageviews
    file: ./data/orcas.tsv    # external dump (also tries <file>.gz)
    sample-classpath: data/orcas-sample.tsv
    max-rows: 25000000        # safety cap on rows read (full ORCAS ~18M)
    sample-mod: 8             # keep 1 in N queries by hash (bounds memory, spans whole file)
    min-views: 1              # pageviews only: min view count
    project-filter: en        # pageviews only: keep this Wikipedia project

logging:
  level:
    com.dsss: INFO
