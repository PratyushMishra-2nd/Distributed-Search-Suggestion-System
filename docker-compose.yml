# Full stack for the "docker" profile: 3 standalone Redis nodes (physical cache
# nodes the consistent-hash ring shards across) + PostgreSQL + backend + frontend.
#
# Usage:
#   docker compose up -d --build
#   open http://localhost:8081        # frontend (nginx proxies API to backend)
#
# Default (no profile) ignores this and uses embedded Redis/Postgres instead.
services:
  redis-0:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]

  redis-1:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6380:6379"]

  redis-2:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6381:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports: ["5434:5432"]   # 5434 on host to avoid native (5432) / embedded (5433)
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Downloads the real ORCAS dump into the shared data volume once (skips if
  # already present), then exits. Backend waits for it to finish.
  dataset-init:
    image: curlimages/curl:8.10.1
    volumes:
      - ./backend/data:/data
    command:
      - sh
      - -c
      - >
        if [ -f /data/orcas.tsv.gz ] || [ -f /data/orcas.tsv ]; then
          echo "ORCAS already present, skipping download";
        else
          echo "Downloading ORCAS (~330MB)...";
          curl -fL --retry 3 -o /data/orcas.tsv.gz
          https://msmarco.z22.web.core.windows.net/msmarcoranking/orcas.tsv.gz;
        fi

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Override application-docker.yml's localhost addrs with container hostnames.
      APP_CACHE_NODES_0: redis-0:6379
      APP_CACHE_NODES_1: redis-1:6379
      APP_CACHE_NODES_2: redis-2:6379
      APP_DB_URL: jdbc:postgresql://postgres:5432/postgres
    ports: ["8080:8080"]
    volumes:
      # Real ORCAS dump lives on the host; container reads ./data/orcas.tsv(.gz).
      # Populate it first: scripts/fetch-dataset.ps1  (or .sh)
      - ./backend/data:/app/data
    depends_on:
      dataset-init:
        condition: service_completed_successfully
      redis-0:
        condition: service_started
      redis-1:
        condition: service_started
      redis-2:
        condition: service_started
      postgres:
        condition: service_started

  frontend:
    build: ./frontend
    ports: ["8081:80"]   # nginx serves the SPA and proxies /suggest etc. to backend
    depends_on:
      - backend

volumes:
  pgdata:
