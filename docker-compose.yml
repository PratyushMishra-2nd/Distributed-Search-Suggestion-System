# Real infrastructure for the "docker" profile: 3 standalone Redis nodes
# (physical cache nodes the consistent-hash ring shards across) + PostgreSQL.
#
# Usage:
#   docker compose up -d
#   cd backend && mvn spring-boot:run -Dspring-boot.run.profiles=docker
#
# Default (no profile) ignores this and uses embedded Redis/Postgres instead.
services:
  redis-0:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]

  redis-1:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6380:6379"]

  redis-2:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6381:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports: ["5434:5432"]   # 5434 on host to avoid native (5432) / embedded (5433)
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
