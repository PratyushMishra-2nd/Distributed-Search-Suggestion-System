server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any non-API, non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API paths to the backend container (same set as the Vite dev proxy).
    location ~ ^/(suggest|search|trending|cache|metrics) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
